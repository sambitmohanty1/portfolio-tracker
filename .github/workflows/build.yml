name: Build Standalone Desktop App

on:
  push:
    branches: ["main"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_folder:  dist/NovaPortfolio
            artifact_onefile: dist/NovaPortfolio-onefile.exe
            zip_folder:       NovaPortfolio-Windows-folder.zip
            zip_onefile:      NovaPortfolio-Windows-onefile.zip

          - os: macos-latest
            platform: macos
            artifact_folder:  dist/NovaPortfolio
            artifact_onefile: dist/NovaPortfolio-onefile
            zip_folder:       NovaPortfolio-macOS-folder.zip
            zip_onefile:      NovaPortfolio-macOS-onefile.zip

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.platform }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + npm cache ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── pip cache ───────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            backend/venv
            ~/.cache/pip
          key: pip-${{ matrix.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ matrix.os }}-

      # ── Install frontend dependencies ───────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # ── Build everything ────────────────────────────────────────────
      - name: Build desktop application
        run: python build_desktop.py

      # ── Zip outputs (Windows) ───────────────────────────────────────
      - name: Zip outputs (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.artifact_folder }}\*" `
            -DestinationPath "${{ matrix.zip_folder }}" -Force
          Compress-Archive -Path "${{ matrix.artifact_onefile }}" `
            -DestinationPath "${{ matrix.zip_onefile }}" -Force

      # ── Zip outputs (macOS) ─────────────────────────────────────────
      - name: Zip outputs (macOS)
        if: matrix.platform == 'macos'
        run: |
          zip -r "${{ matrix.zip_folder }}" "${{ matrix.artifact_folder }}/"
          zip "${{ matrix.zip_onefile }}" "${{ matrix.artifact_onefile }}"

      # ── Upload to Actions run (available on every push) ─────────────
      - name: Upload folder build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_folder }}
          path: ${{ matrix.zip_folder }}

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_onefile }}
          path: ${{ matrix.zip_onefile }}

  # ── Create GitHub Release (only on v*.*.* tags) ─────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets (debug)
        run: ls -lh release-assets/

      - name: Create Release and upload assets
        run: |
          gh release create "${{ github.ref_name }}" \
            release-assets/*.zip \
            --title "NovaPortfolio ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
